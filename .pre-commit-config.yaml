# Pre-commit hooks for iCELL.
#
# Phase 1 setup: only hooks that the codebase passes TODAY are enabled.
# Stricter hooks (ruff, mypy, prettier, eslint) are listed but commented
# out — each phase that drains the corresponding violations enables its
# hook. This means `pre-commit install` is safe to run today without
# blocking commits.
#
#   Phase 3 → uncomment ruff (engine path) + mypy
#   Phase 4 → uncomment prettier (after the one-shot reformat lands)
#   Phase 5 → uncomment eslint and tighten ruff to backend
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: mixed-line-ending
        args: ['--fix=lf']

